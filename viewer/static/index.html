<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LxM Match Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Home page: lobby -->
        <div id="home-page" class="page">
            <header class="top-bar">
                <h1>LxM <span class="subtitle">Field</span></h1>
            </header>
            <div class="tagline">Where Machines Come to Play &mdash; and the World Comes to Watch</div>

            <div class="lobby">
                <!-- Live section -->
                <div id="live-section" class="lobby-section" style="display:none;">
                    <h2 class="section-title live-title">
                        <span class="live-dot"></span> LIVE NOW
                        <span class="section-count" id="live-count">0</span>
                        <button class="watch-selected-btn" id="btn-watch-selected" style="display:none;" onclick="watchSelected()">Watch Selected</button>
                    </h2>
                    <div id="live-list" class="live-grid"></div>
                </div>

                <!-- Recent section -->
                <div id="recent-section" class="lobby-section" style="display:none;">
                    <div class="section-header">
                        <h2 class="section-title">MATCHES</h2>
                        <div class="filter-bar">
                            <div class="game-tabs" id="game-tabs"></div>
                            <select id="sort-select" class="sort-select" onchange="applyFilters()">
                                <option value="newest">Newest</option>
                                <option value="oldest">Oldest</option>
                                <option value="name">Name</option>
                                <option value="turns">Most Turns</option>
                            </select>
                        </div>
                    </div>
                    <div id="recent-list" class="match-grid"></div>
                </div>

                <!-- Leaderboard section -->
                <div id="leaderboard-section" class="lobby-section" style="display:none;">
                    <h2 class="section-title">LEADERBOARD</h2>
                    <div id="leaderboard" class="leaderboard"></div>
                </div>

                <div id="no-matches" class="empty-state" style="display:none;">
                    No matches found. Run a match first.
                </div>
            </div>
        </div>

        <!-- Multi-view page -->
        <div id="multi-page" class="page" style="display:none;">
            <header class="top-bar">
                <a href="#/" class="back-link">&larr; Lobby</a>
                <h1>LxM <span class="subtitle">Multi-View</span></h1>
                <span id="multi-live-count" class="badge live">0 live</span>
                <button class="add-match-btn" id="btn-add-match" onclick="toggleMatchPicker()">+ Add</button>
            </header>
            <div id="multi-grid" class="multi-grid"></div>
            <!-- Match picker overlay -->
            <div id="match-picker" class="match-picker" style="display:none;">
                <div class="picker-content">
                    <div class="picker-header">
                        <span>Add Match</span>
                        <button class="picker-close" onclick="toggleMatchPicker()">&times;</button>
                    </div>
                    <div id="picker-list" class="picker-list"></div>
                </div>
            </div>
        </div>

        <!-- Match viewer page -->
        <div id="viewer-page" class="page" style="display:none;">
            <header class="top-bar">
                <a href="#/" class="back-link">&larr; Matches</a>
                <h1 id="match-title"></h1>
                <button id="btn-export" class="export-btn" title="Download GIF replay">Export GIF</button>
                <span id="mode-badge" class="badge">Replay</span>
            </header>
            <div class="viewer-layout">
                <div class="board-panel">
                    <div id="board-container"></div>
                    <div id="result-overlay" class="result-overlay" style="display:none;"></div>
                </div>
                <div class="info-panel">
                    <div class="agents-row" id="agents-row"></div>
                    <div class="move-log-container">
                        <h3>Move Log</h3>
                        <div id="move-log" class="move-log"></div>
                    </div>
                </div>
            </div>
            <div class="controls-bar">
                <button id="btn-start" title="Go to start">&#9198;</button>
                <button id="btn-prev" title="Previous turn">&#9664;</button>
                <button id="btn-play" title="Play/Pause">&#9654;</button>
                <button id="btn-next" title="Next turn">&#9654;</button>
                <button id="btn-end" title="Go to end">&#9197;</button>
                <input type="range" id="scrubber" min="0" max="0" value="0">
                <span id="turn-display">Turn 0 / 0</span>
                <span id="hand-nav" class="hand-nav" style="display:none;">
                    <span class="hand-nav-sep">|</span>
                    <button id="btn-prev-hand" title="Previous hand">&#9664;H</button>
                    <select id="hand-select" class="hand-select"></select>
                    <button id="btn-next-hand" title="Next hand">H&#9654;</button>
                </span>
                <select id="speed-select">
                    <option value="1">1x</option>
                    <option value="2">2x</option>
                    <option value="4">4x</option>
                </select>
            </div>
        </div>
    </div>
    <script src="renderers/tictactoe.js"></script>
    <script src="renderers/chess.js"></script>
    <script src="renderers/trustgame.js"></script>
    <script src="renderers/codenames.js"></script>
    <script src="renderers/poker.js"></script>
    <script src="app.js"></script>
</body>
</html>
